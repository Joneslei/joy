        :root {
            --blue-team: #3b82f6;
            --red-team: #ef4444;
            --primary: #3b82f6;
        }
        body {
            overflow: hidden;
            background-color: #f8fafc;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            height: 100vh;
            height: -webkit-fill-available;
        }
        html {
            height: -webkit-fill-available;
        }
        .option-btn {
            -webkit-transition: all 0.1s ease;
            transition: all 0.1s ease;
            touch-action: manipulation;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .option-btn:active {
            -webkit-transform: scale(0.9);
            transform: scale(0.9);
        }
        .rope-container {
            position: relative;
            height: 100px;
            width: 100%;
            background: transparent;
            overflow: visible;
        }
        .rope {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 10px;
            background: #8b4513;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            z-index: 10;
            border-radius: 5px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .ribbon-svg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            z-index: 20;
        }
        .character {
            width: 120px;
            height: 120px;
            object-fit: contain;
            position: absolute;
            bottom: 5px;
            z-index: 30;
        }
        .character-blue-1 { left: 5%; }
        .character-blue-2 { left: 20%; }
        .character-red-1 { right: 5%; -webkit-transform: scaleX(-1); transform: scaleX(-1); }
        .character-red-2 { right: 20%; -webkit-transform: scaleX(-1); transform: scaleX(-1); }

        .tug-group {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .win-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        #landscape-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: #1e293b;
            z-index: 999;
            color: white;
            text-align: center;
            padding-top: 20vh;
        }
        @media screen and (orientation: portrait) and (max-width: 1024px) {
            #landscape-hint { display: block; }
        }

        .question-text {
            font-size: 2.5rem;
            line-height: 1.5;
            text-align: left;
            word-break: break-all;
            display: block;
            width: 100%;
        }

            display: inline-flex;
            width: 3.5rem;
            height: 3.5rem;
            border: 3px dashed #cbd5e1;
            border-radius: 0.5rem;
            margin: 0 0.25rem;

            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 900;
            flex-shrink: 0;
        }
        .win-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            overflow-y: auto;
            padding: 2rem;
        }
        .wrong-list {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
            text-align: left;

            margin-bottom: 0.5rem;

  &lt;script&gt;
    const wordBank = [

        { text: &quot;（）业&quot;, answer: [&quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },

        { text: &quot;（）手工&quot;, answer: [&quot;做&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）文&quot;, answer: [&quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）火车&quot;, answer: [&quot;坐&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）事&quot;, answer: [&quot;做&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;合（）&quot;, answer: [&quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;请（）&quot;, answer: [&quot;坐&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）椅&quot;, answer: [&quot;座&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;创（）&quot;, answer: [&quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）家务&quot;, answer: [&quot;做&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },

        { text: &quot;（）电梯&quot;, answer: [&quot;坐&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;工（）&quot;, answer: [&quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）游戏&quot;, answer: [&quot;做&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;一（）桥&quot;, answer: [&quot;座&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）家&quot;, answer: [&quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）板凳&quot;, answer: [&quot;坐&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）早操&quot;, answer: [&quot;做&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;写（）&quot;, answer: [&quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;（）经&quot;, answer: [&quot;已&quot;], options: [&quot;己&quot;, &quot;已&quot;] },
        { text: &quot;自（）&quot;, answer: [&quot;己&quot;], options: [&quot;己&quot;, &quot;已&quot;] },
        { text: &quot;（）知&quot;, answer: [&quot;已&quot;], options: [&quot;己&quot;, &quot;已&quot;] },
        { text: &quot;舍（）为人&quot;, answer: [&quot;己&quot;], options: [&quot;己&quot;, &quot;已&quot;] },
        { text: &quot;（）走&quot;, answer: [&quot;已&quot;], options: [&quot;己&quot;, &quot;已&quot;] }
    ];

    const sentenceBank = [
        { text: &quot;我（）在（）位上（）（）业。&quot;, answer: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;我自（）（）经学会整理书包啦。&quot;, answer: [&quot;己&quot;, &quot;已&quot;], options: [&quot;己&quot;, &quot;已&quot;] },
        { text: &quot;请大家（）在自己的（）位上。&quot;, answer: [&quot;坐&quot;, &quot;座&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;我每天放学先（）（）业再玩耍。&quot;, answer: [&quot;做&quot;, &quot;作&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;小宇自（）（）经能自觉完成作业。&quot;, answer: [&quot;己&quot;, &quot;已&quot;], options: [&quot;己&quot;, &quot;已&quot;] },
        { text: &quot;爸爸（）在（）椅上（）手工。&quot;, answer: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;我们一起合（），认真（）事情。&quot;, answer: [&quot;作&quot;, &quot;做&quot;], options: [&quot;坐&quot;, &quot;座&quot;, &quot;做&quot;, &quot;作&quot;] },
        { text: &quot;我自（）（）懂得按时睡觉。&quot;, answer: [&quot;己&quot;, &quot;已&quot;], options: [&quot;己&quot;, &quot;已&quot;] }
    ];

    let gameState = {
        isPlaying: false,
        timeLeft: 60,
        ropePosition: 0,
        scores: { blue: 0, red: 0 },
        totalAnswered: { blue: 0, red: 0 },
        startTime: 0,
        currentQuestions: { blue: null, red: null },
        currentBlankIndex: { blue: 0, red: 0 },
        wrongQuestions: { blue: [], red: [] }
    };

    const config = { pullStrength: 12, winThreshold: 100 };

    document.getElementById('start-btn').addEventListener('click', startGame);

    function startGame() {
        gameState.isPlaying = true;
        gameState.timeLeft = 60;
        gameState.ropePosition = 0;
        gameState.scores = { blue: 0, red: 0 };
        gameState.totalAnswered = { blue: 0, red: 0 };
        gameState.wrongQuestions = { blue: [], red: [] };
        gameState.startTime = Date.now();
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('audio-start').play();
        
        // 准备题库：10道词语 + 3道句子
        gameState.bluePool = shuffle([...wordBank]).slice(0, 10).concat(shuffle([...sentenceBank]).slice(0, 3));
        gameState.redPool = shuffle([...wordBank]).slice(0, 10).concat(shuffle([...sentenceBank]).slice(0, 3));
        shuffle(gameState.bluePool);
        shuffle(gameState.redPool);

        generateQuestion('blue');
        generateQuestion('red');
        startTimer();
    }

    function shuffle(array) {
        for (let i = array.length - 1; i &gt; 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startTimer() {
        const timerInterval = setInterval(() =&gt; {
            if (!gameState.isPlaying) { clearInterval(timerInterval); return; }
            gameState.timeLeft--;
            const mins = Math.floor(gameState.timeLeft / 60).toString().padStart(2, '0');
            const secs = (gameState.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
            if (gameState.timeLeft &lt;= 0) {
                clearInterval(timerInterval);
                endGame(gameState.scores.blue &gt;= gameState.scores.red ? 'blue' : 'red');
            }
        }, 1000);
    }

    function generateQuestion(team) {
        const pool = team === 'blue' ? gameState.bluePool : gameState.redPool;
        if (pool.length === 0) {
            // 题库用完则循环
            const newPool = team === 'blue' ? 
                shuffle([...wordBank]).slice(0, 10).concat(shuffle([...sentenceBank]).slice(0, 3)) :
                shuffle([...wordBank]).slice(0, 10).concat(shuffle([...sentenceBank]).slice(0, 3));
            if (team === 'blue') gameState.bluePool = shuffle(newPool);
            else gameState.redPool = shuffle(newPool);
        }
        
        const q = pool.pop();
        gameState.currentQuestions[team] = q;
        gameState.currentBlankIndex[team] = 0;
        
        const qEl = document.getElementById(`question-${team}`);
        // 将（）替换为带索引的空位
        let html = q.text.replace(/（）/g, '&lt;span class=&quot;blank-box&quot;&gt;&lt;/span&gt;');
        qEl.innerHTML = html;
        
        renderOptions(team, q.options);
    }

    function renderOptions(team, options) {
        const optEl = document.getElementById(`options-${team}`);
        optEl.innerHTML = options.map(opt =&gt; `
            &lt;button onclick=&quot;handleSelect('${team}', '${opt}')&quot; class=&quot;option-btn bg-white border-2 border-gray-200 text-gray-800 h-16 md:h-24 hover:bg-gray-50 active:bg-gray-100&quot;&gt;
                ${opt}
            &lt;/button&gt;
        `).join('');
    }

    window.handleSelect = function(team, val) {
        if (!gameState.isPlaying) return;
        
        const q = gameState.currentQuestions[team];
        const correctVal = q.answer[gameState.currentBlankIndex[team]];
        const blanks = document.getElementById(`question-${team}`).querySelectorAll('.blank-box');
        const currentBlank = blanks[gameState.currentBlankIndex[team]];

        if (val === correctVal) {
            // 正确：填入并飞入效果
            currentBlank.textContent = val;
            currentBlank.classList.add('filled', 'text-green-600');
            gameState.currentBlankIndex[team]++;
            
            // 检查是否完成本题
            if (gameState.currentBlankIndex[team] &gt;= q.answer.length) {
                gameState.scores[team]++;
                gameState.totalAnswered[team]++;
                document.getElementById(`score-${team}`).textContent = gameState.scores[team];
                
                const direction = team === 'blue' ? -1 : 1;
                gameState.ropePosition += direction * config.pullStrength;
                animatePull(team);
                
                if (Math.abs(gameState.ropePosition) &gt;= config.winThreshold) {
                    endGame(team);
                } else {
                    setTimeout(() =&gt; generateQuestion(team), 300);
                }
            }
        } else {
            // 错误：记录错题并抖动反馈
            const q = gameState.currentQuestions[team];
            const isAlreadyRecorded = gameState.wrongQuestions[team].some(item =&gt; item.text === q.text);
            if (!isAlreadyRecorded) {
                gameState.wrongQuestions[team].push(JSON.parse(JSON.stringify(q)));
            }
            
            currentBlank.classList.add('shake', 'border-red-500');
            setTimeout(() =&gt; currentBlank.classList.remove('shake', 'border-red-500'), 500);
        }
    };

    function animatePull(team) {
        const tugGroup = document.getElementById('tug-group');
        anime({
            targets: tugGroup,
            translateX: gameState.ropePosition * (window.innerWidth &lt; 768 ? 2 : 4), 
            duration: 600,
            easing: 'easeOutQuad'
        });
        const characters = document.querySelectorAll(`.character-${team}-1, .character-${team}-2`);
        anime({
            targets: characters,
            translateX: [team === 'blue' ? -20 : 20, 0],
            scale: [1.1, 1],
            duration: 400,
            easing: 'easeOutElastic(1, .5)'
        });
    }

    function endGame(winner) {
        gameState.isPlaying = false;
        const overlay = document.getElementById('win-overlay');
        const winText = document.getElementById('win-text');
        const statsText = document.getElementById('stats-text');
        
        overlay.style.display = 'flex';
        winText.textContent = winner === 'blue' ? '蓝队获胜！' : '红队获胜！';
        winText.style.color = winner === 'blue' ? 'var(--blue-team)' : 'var(--red-team)';
        
        const duration = Math.floor((Date.now() - gameState.startTime) / 1000);
        statsText.innerHTML = `
            蓝队得分: ${gameState.scores.blue} | 红队得分: ${gameState.scores.red}&lt;br&gt;
            比赛耗时: ${duration}秒
        `;
        
        document.getElementById(`audio-win-${winner}`).play();
        
        // 渲染错题集
        renderWrongList('blue');
        renderWrongList('red');
        
        // 语音播报逻辑
        speakSummary(winner);
        
        anime({ targets: '#win-overlay', opacity: [0, 1], scale: [0.8, 1], duration: 800 });
    }

    function speakSummary(winner) {
        const blueWrongs = gameState.wrongQuestions.blue;
        const redWrongs = gameState.wrongQuestions.red;
        
        const getWrongContent = (wrongs) =&gt; {
            return wrongs.map(q =&gt; {
                const tempAnswers = [...q.answer];
                // 将（）替换为正确答案，形成完整的词语或句子
                return q.text.replace(/（）/g, () =&gt; tempAnswers.shift());
            }).join('，');
        };

        let speechParts = [];

        if (blueWrongs.length === redWrongs.length) {
            // 情况3：错题数量相同
            speechParts.push(&quot;本场比赛结束。&quot;);
            if (redWrongs.length &gt; 0) {
                speechParts.push(`红方答错：${getWrongContent(redWrongs)}。`);
            }
            if (blueWrongs.length &gt; 0) {
                speechParts.push(`蓝方答错：${getWrongContent(blueWrongs)}。`);
            }
            speechParts.push(&quot;大家要把易错字词记牢，现在记住了吗？&quot;);
        } else {
            const loser = winner === 'blue' ? 'red' : 'blue';
            const loserName = loser === 'blue' ? '蓝方' : '红方';
            const winnerName = winner === 'blue' ? '蓝方' : '红方';
            const loserWrongs = gameState.wrongQuestions[loser];
            const winnerWrongs = gameState.wrongQuestions[winner];

            // 先播报获胜方的喜报
            speechParts.push(`恭喜${winnerName}获得本场PK胜利！`);

            // 再播报另一方需要巩固的内容
            if (loserWrongs.length &gt; winnerWrongs.length || loserWrongs.length &gt; 0) {
                speechParts.push(`${loserName}答错内容有：${getWrongContent(loserWrongs)}。`);
                speechParts.push(&quot;这些字词要记牢，现在你记住了吗？&quot;);
            } else if (winnerWrongs.length &gt; 0) {
                // 兜底：如果赢家也有错题且比输家多（虽然逻辑上少见）
                speechParts.push(`${winnerName}虽然赢了，但也有错题：${getWrongContent(winnerWrongs)}。也要记牢哦！`);
            }
        }

        // 逐段播报，确保停顿感
        const speakNextPart = (index) =&gt; {
            if (index &gt;= speechParts.length) return;
            const utterance = new SpeechSynthesisUtterance(speechParts[index]);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8;
            utterance.onend = () =&gt; {
                // 每一段结束后稍微停顿一下再播报下一段
                setTimeout(() =&gt; speakNextPart(index + 1), 500);
            };
            window.speechSynthesis.speak(utterance);
        };

        speakNextPart(0);
    }

    function renderWrongList(team) {
        const container = document.querySelector(`#wrong-${team} .wrong-container`);
        const wrongs = gameState.wrongQuestions[team];
        
        if (wrongs.length === 0) {
            container.innerHTML = '&lt;div class=&quot;text-gray-500 text-sm italic py-2&quot;&gt;太棒了，没有错题！&lt;/div&gt;';
            return;
        }

        container.innerHTML = wrongs.map(q =&gt; {
            const isSentence = q.text.includes('。') || q.text.length &gt; 10;
            const tempAnswers = [...q.answer];
            const renderedText = q.text.replace(/（）/g, () =&gt; `&lt;span class=&quot;text-green-400 font-bold underline mx-1&quot;&gt;${tempAnswers.shift()}&lt;/span&gt;`);
            
            const hint = isSentence ? &quot;这句话要多读几遍，注意汉字在句子中的用法哦！&quot; : &quot;这个词语要记牢哦，现在你学会了吗？&quot;;
            
            return `
                &lt;div class=&quot;wrong-item&quot;&gt;
                    &lt;div class=&quot;title&quot;&gt;错题：${renderedText}&lt;/div&gt;
                    &lt;div class=&quot;hint&quot;&gt;提示：${hint}&lt;/div&gt;
                &lt;/div&gt;
            `;
        }).join('');
    }
  &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId

        window.frog.add({
          url: '/click/HtmlPage/start',

          eventName: 'start'

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>
