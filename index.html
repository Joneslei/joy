<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>一年级下册语文游戏入口</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #223047;
      background:
        linear-gradient(135deg, rgba(255, 245, 224, 0.95), rgba(224, 245, 255, 0.95)),
        #f5fbff;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .header {
      margin-bottom: 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: #52627a;
      font-size: 18px;
      line-height: 1.6;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .game-link {
      display: flex;
      min-height: 138px;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border: 2px solid rgba(34, 48, 71, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: #223047;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 12px 26px rgba(48, 72, 100, 0.12);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .game-link:hover,
    .game-link:focus-visible {
      border-color: #2f80ed;
      box-shadow: 0 16px 34px rgba(47, 128, 237, 0.2);
      outline: none;
      transform: translateY(-2px);
    }

    @media (max-width: 720px) {
      main {
        padding: 28px 0;
      }

      .games {
        grid-template-columns: 1fr;
      }

      .game-link {
        min-height: 112px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="header" aria-labelledby="page-title">
      <h1 id="page-title">一年级下册语文游戏入口</h1>
      <p class="subtitle">点击下面的按钮进入对应游戏</p>
    </section>

    <nav class="games" aria-label="语文游戏列表">
      <a class="game-link" href="一下语文【410个生字表消消乐】预习复习游戏.html">410个生字表消消乐</a>
      <a class="game-link" href="一下语文【切水果识字410个】闯关游戏（抖音小红书同名：快乐的孩子王）原创.html">切水果识字410个</a>
      <a class="game-link" href="一下语文【坐、座、做、作_已、己】拔河PK答题游戏【抖音小红书同名：快乐的孩子王】（原创）课件.html">坐、座、做、作 / 已、己 拔河PK</a>
      <a class="game-link" href="一下语文【量词】双人PK游戏（抖音小红书同名：快乐的孩子王）原创.html">量词双人PK</a>
    </nav>
  </main>
</body>
</html>
