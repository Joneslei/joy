<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快乐学习游戏导航</title>
  <style>
    :root {
      --bg: #f7f3ea;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #5f6b7a;
      --accent: #147d64;
      --accent-dark: #0f5f4c;
      --line: #d8dee6;
      --shadow: 0 14px 32px rgba(31, 41, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(20, 125, 100, 0.16), transparent 30rem),
        linear-gradient(135deg, #f7f3ea 0%, #eef7f4 100%);
    }

    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 52px 0;
    }

    .hero {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      display: flex;
      min-height: 172px;
      padding: 24px;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      color: inherit;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(20, 125, 100, 0.45);
      box-shadow: 0 18px 38px rgba(31, 41, 51, 0.16);
      outline: none;
    }

    .tag {
      width: max-content;
      padding: 4px 10px;
      color: var(--accent-dark);
      background: #dff4ee;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    .title {
      margin: 0;
      font-size: 23px;
      line-height: 1.35;
      font-weight: 800;
    }

    .action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 16px;
      font-weight: 700;
    }

    .action::after {
      content: ">";
      font-size: 18px;
      line-height: 1;
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 1080px);
        padding: 32px 0;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 148px;
        padding: 20px;
      }

      .title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">快乐学习游戏导航</h1>
      <p class="subtitle">选择下面的游戏或课件，点击即可进入。</p>
    </section>

    <nav class="grid" aria-label="课件导航">
      <a class="card" href="一下语文【量词】双人PK游戏（抖音小红书同名：快乐的孩子王）原创.html">
        <span class="tag">双人PK</span>
        <p class="title">量词双人PK游戏</p>
        <span class="action">进入游戏</span>
      </a>

      <a class="card" href="一下语文【坐、座、做、作_已、己】拔河PK答题游戏【抖音小红书同名：快乐的孩子王】（原创）课件.html">
        <span class="tag">拔河答题</span>
        <p class="title">坐、座、做、作 / 已、己</p>
        <span class="action">进入课件</span>
      </a>

      <a class="card" href="一下语文【切水果识字410个】闯关游戏（抖音小红书同名：快乐的孩子王）原创.html">
        <span class="tag">闯关游戏</span>
        <p class="title">切水果识字410个</p>
        <span class="action">进入游戏</span>
      </a>

      <a class="card" href="一下语文【410个生字表消消乐】预习复习游戏.html">
        <span class="tag">预习复习</span>
        <p class="title">410个生字表消消乐</p>
        <span class="action">进入游戏</span>
      </a>
    </nav>
  </main>
</body>
</html>
