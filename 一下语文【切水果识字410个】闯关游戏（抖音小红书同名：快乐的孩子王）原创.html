    &lt;title&gt;切水果识字大冒险 - 终极合并完整版&lt;/title&gt;
    &lt;!-- Tailwind CSS --&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zgLDUdmazTYc0B4K6Cor.js&quot;&gt;&lt;/script&gt;
    &lt;!-- Anime.js --&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zZZY40t7WJC7UdQCPACm.js&quot;&gt;&lt;/script&gt;
    &lt;style&gt;
        :root {
            --primary-color: #FF5600;
            --bg-color: #F4F3EC;
            --text-color: #0C0302;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .pinyin-font {
            font-family: &quot;KaiTi&quot;, &quot;楷体&quot;, &quot;STKaiti&quot;, serif;
        }

        /* 页面切换 */
        .page {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        .page.active { display: flex; }

        /* 首页背景 */
        #page-home {
            background: url('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/p4mYGf5cBYmt7HTsmpqoSn.jpg') center center / cover no-repeat;
        }

        .home-overlay {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(2px);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 5vh;
        }

        /* 首页水果入口 */
        .fruit-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            padding: 2rem;
            max-width: 1000px;
            width: 90%;
        }

        @media (max-width: 768px) {
            .fruit-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .fruit-icon { width: 80px !important; height: 80px !important; }
        }

        .fruit-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .fruit-item:hover { transform: scale(1.1); }

        .fruit-icon {
            width: 130px;
            height: 130px;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        .fruit-label {
            margin-top: 10px;
            font-weight: bold;
            font-size: 1.3rem;
            background: white;
            padding: 6px 20px;
            border-radius: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            white-space: nowrap;
            color: #d35400;
        }

        /* 游戏UI */
        .game-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            pointer-events: none;
        }

        .progress-container {
            background: rgba(255,255,255,0.9);
            padding: 10px 25px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            pointer-events: auto;
        }

        .progress-bar-bg {
            width: 220px;
            height: 14px;
            background: #eee;
            border-radius: 7px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            width: 0%;
            transition: width 0.3s ease;
        }

        .target-pinyin {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 12px 60px;
            border-radius: 70px;
            font-size: 3.8rem;
            font-weight: bold;
            color: var(--primary-color);
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
            border: 6px solid var(--primary-color);
            z-index: 40;
        }

        @media (max-width: 768px) {
            .target-pinyin { font-size: 2.8rem; padding: 8px 40px; top: 75px; }
            .progress-bar-bg { width: 120px; }
        }

        /* 游戏元素 */
        #fruit-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .game-fruit {
            position: absolute;
            width: 180px; /* 调大点击区域 */
            height: 180px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 20;
            /* 增加点击灵敏度：通过透明边框扩大点击范围 */
            border: 20px solid transparent;
            background-clip: padding-box;
        }

        .game-fruit img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .fruit-text {
            position: absolute;
            font-size: 4.5rem;
            font-weight: bold;
            color: #333;
            text-shadow: 4px 4px 0 #fff, -4px -4px 0 #fff, 4px -4px 0 #fff, -4px 4px 0 #fff;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .game-fruit { width: 140px; height: 140px; }
            .fruit-text { font-size: 3.5rem; }
        }

        /* 特效 */
        .slice-part {
            position: absolute;
            width: 180px;
            height: 180px;
            pointer-events: none;
            z-index: 30;
        }

        .explosion {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ffeb3b 0%, #ff5722 70%, transparent 100%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        /* 飘屏文字 */
        .floating-text {
            position: fixed;
            color: #FFD700;
            font-size: 3rem;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
        }

        /* 结算弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
        }
        .modal-content {
            background: white;
            padding: 45px;
            border-radius: 45px;
            text-align: center;
            max-width: 650px;
            width: 92%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .star-rating {
            font-size: 4.5rem;
            color: #FFD700;
            margin: 25px 0;
        }

        .score-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0;
            text-align: left;
            background: #f7f7f7;
            padding: 25px;
            border-radius: 25px;
            font-size: 1.1rem;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            padding: 14px 30px;
            border-radius: 35px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            z-index: 100;
            pointer-events: auto;
        }
    &lt;/style&gt;

        const encouragementAssets = [

        };

        // --- 核心变量 ---
        let currentUnit = 1;
        let currentPool = [];
        let currentTarget = null;
        let isGameActive = false;
        let roundCount = 0;
        let totalInUnit = 0;
        let completedInUnit = 0;
        let roundStartTime = 0;
        let baseDuration = 3500; // 基础时长（越长越慢）

        // 统计数据
        let stats = {
            correct: 0,
            wrong: 0,
            bombHits: 0,
            startTime: 0,
            totalTime: 0
        };

        // --- 音频系统 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            if (type === 'slice') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'bomb') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.4);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(now + 0.4);
            }
        }

        function playVoice(url) {
            const audio = new Audio(url);
            audio.play();
        }

        // --- 页面逻辑 ---
        function initHome() {
            const grid = document.getElementById('unit-grid');
            grid.innerHTML = '';
            for (let i = 1; i &lt;= 8; i++) {
                const item = document.createElement('div');
                item.className = 'fruit-item';
                item.onclick = () =&gt; startUnit(i);
                item.innerHTML = `
                    &lt;img src=&quot;${fruitAssets[i-1].url}&quot; class=&quot;fruit-icon&quot;&gt;
                    &lt;div class=&quot;fruit-label&quot;&gt;第 ${i} 单元&lt;/div&gt;
                `;
                grid.appendChild(item);
            }
        }

        function startUnit(unit) {
            currentUnit = unit;
            currentPool = [...unitData[unit]];
            totalInUnit = currentPool.length;
            completedInUnit = 0;
            roundCount = 0;
            baseDuration = 3500; // 重置速度
            stats = { correct: 0, wrong: 0, bombHits: 0, startTime: Date.now(), totalTime: 0 };
            
            shuffle(currentPool);
            updateProgress();
            switchPage('page-game');
            nextRound();
        }

        function goHome() {
            isGameActive = false;
            switchPage('page-home');
        }

        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p =&gt; p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function updateProgress() {
            const percent = (completedInUnit / totalInUnit) * 100;
            document.getElementById('progress-bar-fill').style.width = percent + '%';
            document.getElementById('progress-text').textContent = `${completedInUnit} / ${totalInUnit}`;
        }

        // --- 游戏逻辑 ---
        function nextRound() {
            if (currentPool.length === 0) {
                showWin();
                return;
            }
            isGameActive = true;
            roundCount++;
            roundStartTime = Date.now();
            currentTarget = currentPool.pop();
            document.getElementById('target-pinyin').textContent = currentTarget.p;
            
            const container = document.getElementById('fruit-container');
            container.innerHTML = '';

            // 节奏调节：每9轮稍微加快
            let currentDuration = baseDuration;
            if (roundCount % 9 === 0) {
                currentDuration *= 0.85; // 加快15%
            }

            // 准备5个汉字：1个正确 + 4个干扰
            let options = [currentTarget];
            let allWords = Object.values(unitData).flat();
            while (options.length &lt; 5) {
                let randomWord = allWords[Math.floor(Math.random() * allWords.length)];
                if (!options.find(o =&gt; o.w === randomWord.w)) {
                    options.push(randomWord);
                }
            }
            shuffle(options);

            options.forEach((opt, index) =&gt; {
                createFruit(opt, index, options.length, currentDuration);
            });

            // 随机混入真实炸弹 (每8-10轮)
            if (roundCount % (8 + Math.floor(Math.random() * 3)) === 0) {
                createRealBomb(currentDuration);
            }

            // 随机飘屏鼓励 + 语音
            if (completedInUnit &gt; 0 &amp;&amp; completedInUnit % 5 === 0) {
                showFloatingText();
            }

            // 智能减速检测
            startSmartSlowdownCheck();
        }

        let slowdownTimer = null;
        function startSmartSlowdownCheck() {
            if (slowdownTimer) clearTimeout(slowdownTimer);
            slowdownTimer = setTimeout(() =&gt; {
                if (isGameActive) {
                    baseDuration += 500; // 变慢
                    // 重新应用动画速度
                    const fruits = document.querySelectorAll('.game-fruit');
                    fruits.forEach(f =&gt; {
                        const anim = anime.get(f, 'bottom');
                        if (anim) anim.duration += 500;
                    });
                    startSmartSlowdownCheck(); // 继续检测
                }
            }, 5000); // 5秒没点出，开始变慢
        }

        function createFruit(wordData, index, total, duration) {
            const container = document.getElementById('fruit-container');
            const fruit = document.createElement('div');
            fruit.className = 'game-fruit';
            
            const x = 10 + (index * (80 / total));
            fruit.style.left = x + '%';
            fruit.style.bottom = '-200px';

            const isCorrect = wordData.w === currentTarget.w;
            const fruitImg = fruitAssets[Math.floor(Math.random() * fruitAssets.length)].url;

            fruit.innerHTML = `
                &lt;img src=&quot;${fruitImg}&quot;&gt;
                &lt;div class=&quot;fruit-text&quot;&gt;${wordData.w}&lt;/div&gt;
            `;

            fruit.onclick = () =&gt; handleFruitClick(fruit, isCorrect);
            container.appendChild(fruit);

            anime({
                targets: fruit,
                bottom: [
                    { value: 250 + Math.random() * 350, duration: duration/2, easing: 'easeOutQuad' },
                    { value: -200, duration: duration/2, easing: 'easeInQuad' }
                ],
                rotate: anime.random(-45, 45),
                loop: true,
                delay: index * 150
            });
        }

        function createRealBomb(duration) {
            const container = document.getElementById('fruit-container');
            const bomb = document.createElement('div');
            bomb.className = 'game-fruit';
            bomb.style.left = '50%';
            bomb.style.bottom = '-200px';
            bomb.innerHTML = `&lt;img src=&quot;${bombUrl}&quot;&gt;`;
            bomb.onclick = () =&gt; {
                stats.bombHits++;
                playSound('bomb');
                createExplosionEffect(bomb);
                bomb.remove();
            };
            container.appendChild(bomb);

            anime({
                targets: bomb,
                bottom: [
                    { value: 450, duration: duration/2, easing: 'easeOutQuad' },
                    { value: -200, duration: duration/2, easing: 'easeInQuad' }
                ],
                rotate: 360,
                loop: true
            });
        }

        function handleFruitClick(el, isCorrect) {
            if (!isGameActive) return;

            if (isCorrect) {
                isGameActive = false;
                if (slowdownTimer) clearTimeout(slowdownTimer);
                stats.correct++;
                completedInUnit++;
                updateProgress();
                playSound('slice');
                createSliceEffect(el);
                el.style.display = 'none';
                setTimeout(nextRound, 800);
            } else {
                stats.wrong++;
                playSound('bomb');
                createExplosionEffect(el);
                el.querySelector('img').src = bombUrl;
                el.querySelector('.fruit-text').style.display = 'none';
                anime({
                    targets: el,
                    scale: [1, 2, 0],
                    opacity: [1, 1, 0],
                    duration: 400,
                    easing: 'easeOutExpo'
                });
            }
        }

        function createSliceEffect(el) {
            const rect = el.getBoundingClientRect();
            const container = document.body;
            const img = el.querySelector('img').src;

            for (let i = 0; i &lt; 2; i++) {
                const part = document.createElement('div');
                part.className = 'slice-part';
                part.style.left = rect.left + 'px';
                part.style.top = rect.top + 'px';
                part.style.backgroundImage = `url(${img})`;
                part.style.backgroundSize = 'contain';
                part.style.backgroundRepeat = 'no-repeat';
                part.style.clipPath = i === 0 ? 'inset(0 50% 0 0)' : 'inset(0 0 0 50%)';
                container.appendChild(part);

                anime({
                    targets: part,
                    translateX: i === 0 ? -180 : 180,
                    translateY: 350,
                    rotate: i === 0 ? -70 : 70,
                    opacity: 0,
                    duration: 1200,
                    easing: 'easeOutQuart',
                    complete: () =&gt; part.remove()
                });
            }
        }

        function createExplosionEffect(el) {
            const rect = el.getBoundingClientRect();
            const container = document.body;
            const exp = document.createElement('div');
            exp.className = 'explosion';
            exp.style.left = (rect.left + rect.width/2 - 150) + 'px';
            exp.style.top = (rect.top + rect.height/2 - 150) + 'px';
            container.appendChild(exp);

            anime({
                targets: exp,
                scale: [0, 3],
                opacity: [1, 0],
                duration: 700,
                easing: 'easeOutExpo',
                complete: () =&gt; exp.remove()
            });
        }

        function showFloatingText() {
            const asset = encouragementAssets[Math.floor(Math.random() * encouragementAssets.length)];
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = asset.text;
            el.style.left = '100%';
            el.style.top = (25 + Math.random() * 50) + '%';
            document.body.appendChild(el);

            playVoice(asset.audio);

            anime({
                targets: el,
                left: '-60%',
                duration: 5000,
                easing: 'linear',
                complete: () =&gt; el.remove()
            });
        }

        function showWin() {
            isGameActive = false;
            stats.totalTime = (Date.now() - stats.startTime) / 1000;
            
            const accuracy = Math.round((stats.correct / (stats.correct + stats.wrong)) * 100) || 0;
            const avgSpeed = (stats.totalTime / totalInUnit).toFixed(1);
            
            document.getElementById('res-accuracy').textContent = accuracy + '%';
            document.getElementById('res-speed').textContent = avgSpeed + 's';
            document.getElementById('res-errors').textContent = stats.wrong;
            document.getElementById('res-bombs').textContent = stats.bombHits;
            
            const completion = unitCompletionAssets[currentUnit];
            document.getElementById('modal-message').textContent = completion.text;
            playVoice(completion.audio);
            
            let stars = '⭐';
            if (accuracy &gt;= 95 &amp;&amp; stats.bombHits === 0) stars = '⭐⭐⭐';
            else if (accuracy &gt;= 80) stars = '⭐⭐';
            document.getElementById('star-rating').textContent = stars;

            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            goHome();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i &gt; 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        window.onload = initHome;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**

     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
