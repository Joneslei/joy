// 音效与语音管理器
class SoundManager {
    constructor() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.voices = {
            red_half: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/hGwN5qkswhkjjHBiTeMXUA.mp3',
            blue_half: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/xxzQJwUBPRoURfi69Qx7xQ.mp3',
            red_fifteen: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/Zf9cottGnJ5auKVLdMBjyd.mp3',
            blue_fifteen: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/TwoTXDK5qRYoMn3iUXRM8P.mp3',
            red_three: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/TwdPW5eiVD26GzGdBXWN7d.mp3',
            blue_three: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/u6bdJzL3utSkRfj8wpEgk8.mp3',
            start_countdown: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/RVuKuP79nKHfiLggHtXPsT.mp3',
            red_win: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/TNfkMu6RUXuKkbdELVTnk3.mp3',
            blue_win: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/x22iLzkMJ8fMWUdkoyqD7Q.mp3',
            red_first: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/fsAGpXwyUb8LUdrLSitZ9a.mp3',
            blue_first: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/M3uySG6JbLQwQtYCuhN2FW.mp3'
        };
        this.audioCache = {};
    }

    async playVoice(key) {
        const url = this.voices[key];
        if (!this.audioCache[url]) this.audioCache[url] = new Audio(url);
        this.audioCache[url].currentTime = 0;
        this.audioCache[url].play().catch(e =&gt; console.log(e));
    }

    playClick() { this.playTone(600, 300, 0.1, 'sine'); }
    playCorrect() { this.playTone(800, 1200, 0.3, 'sine'); }
    playWrong() { this.playTone(150, 100, 0.3, 'sawtooth'); }
    playTone(f1, f2, dur, type) {
        if(this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(f1, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(f2, this.ctx.currentTime + dur);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
        osc.start(); osc.stop(this.ctx.currentTime + dur);
    }
}

const gameData = rawData.map(item =&gt; {
    const match = item.match(/^一(.)(.+)$/);
    return { q: `一（ ）${match[2]}`, a: match[1] };
});

class PlayerGame {
    constructor(id, side, sound) {
        this.id = id; this.side = side; this.sound = sound;
        this.score = 0; this.currentIndex = 0; this.totalQuestions = 20;
        this.data = []; this.isAnimating = false; this.isFinished = false;
        this.qEl = document.getElementById(`${side}-question`);
        this.optEl = document.getElementById(`${side}-options`);
        this.wrongEl = document.getElementById(`${side}-wrong`);
        this.scoreTopEl = document.getElementById(`${side}-score-top`);
        this.progressTopEl = document.getElementById(`${side}-progress-top`);
        this.starCountEl = document.getElementById(`${side}-star-count`);
        this.progressBarEl = document.getElementById(`${side}-progress-bar`);
    }

    init(allData) {
        this.data = this.shuffle([...allData]).slice(0, this.totalQuestions);
        this.score = 0; this.currentIndex = 0; this.isFinished = false;
        this.updateUI();
    }

    shuffle(arr) {
        for (let i = arr.length - 1; i &gt; 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    updateUI() {
        this.scoreTopEl.textContent = this.score;
        this.starCountEl.textContent = this.score;
        this.progressTopEl.textContent = `${this.currentIndex}/${this.totalQuestions}`;
        // 进度条基于答对星数，满分23（20题+3奖励）
        const percent = (this.score / 23) * 100;
        this.progressBarEl.style.width = `${percent}%`;
    }

    render() {
        if (this.currentIndex &gt;= this.totalQuestions) {
            this.finish(); return;
        }
        const qObj = this.data[this.currentIndex];
        this.qEl.innerHTML = qObj.q.replace('（ ）', `&lt;span id=&quot;${this.side}-target&quot; class=&quot;target-blank&quot;&gt;&lt;/span&gt;`);
        let opts = [qObj.a];
        while(opts.length &lt; 3) {
            const r = distractors[Math.floor(Math.random() * distractors.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        this.shuffle(opts);
        this.optEl.innerHTML = '';
        const colors = this.side === 'red' ? ['bg-red-600', 'bg-orange-600', 'bg-rose-600'] : ['bg-blue-600', 'bg-indigo-600', 'bg-sky-600'];
        opts.forEach((opt, i) =&gt; {
            const btn = document.createElement('button');
            btn.className = `w-14 h-14 md:w-24 md:h-24 rounded-full ${colors[i]} text-white text-xl md:text-4xl font-black btn-shadow flex items-center justify-center transition-transform border-2 border-white/20`;
            btn.textContent = opt;
            btn.onclick = () =&gt; this.handleAnswer(opt, btn);
            this.optEl.appendChild(btn);
        });
        anime({ targets: this.qEl, opacity: [0, 1], scale: [0.8, 1], duration: 300 });
        this.isAnimating = false;
    }

    handleAnswer(ans, btn) {
        if (this.isAnimating || this.isFinished) return;
        this.isAnimating = true; this.sound.playClick();
        const target = document.getElementById(`${this.side}-target`);
        const bRect = btn.getBoundingClientRect();
        const tRect = target.getBoundingClientRect();
        const fly = document.createElement('div');
        fly.textContent = ans;
        fly.className = btn.className.replace('btn-shadow', '').replace('transition-transform', '');
        fly.style.cssText = `position:fixed; left:${bRect.left}px; top:${bRect.top}px; width:${bRect.width}px; height:${bRect.height}px; z-index:100;`;
        document.getElementById('fly-container').appendChild(fly);
        anime({
            targets: fly,
            translateX: tRect.left + tRect.width/2 - (bRect.left + bRect.width/2),
            translateY: tRect.top + tRect.height/2 - (bRect.top + bRect.height/2),
            scale: tRect.width / bRect.width,
            duration: 300,
            easing: 'easeOutQuad',
            complete: () =&gt; { fly.remove(); this.check(ans, target); }
        });
    }

    check(ans, target) {
        const correct = this.data[this.currentIndex].a;
        if (ans === correct) {
            this.sound.playCorrect(); this.score++;
            target.textContent = ans; target.style.borderBottom = 'none';
            anime({
                targets: this.qEl, scale: [1, 1.1, 1], duration: 200,
                complete: () =&gt; {
                    setTimeout(() =&gt; {
                        this.currentIndex++; this.updateUI(); this.checkProgress(); this.render();
                    }, 200);
                }
            });
        } else {
            this.sound.playWrong();
            anime({ targets: this.wrongEl, opacity: [0, 1, 0, 1, 0], duration: 400 });
            setTimeout(() =&gt; {
                this.currentIndex++; this.updateUI(); this.checkProgress(); this.render();
            }, 400);
        }
    }

    checkProgress() {
        const count = this.currentIndex;
        const remaining = this.totalQuestions - count;
        if (count === 10) this.sound.playVoice(`${this.side}_half`);
        else if (count === 15) this.sound.playVoice(`${this.side}_fifteen`);
        else if (count === 17) this.sound.playVoice(`${this.side}_three`);
        if (remaining &lt;= 3 &amp;&amp; remaining &gt; 0) showCountdown(remaining);
    }

    finish() {
        this.isFinished = true;
        this.qEl.innerHTML = '&lt;span class=&quot;text-yellow-400 italic font-black&quot;&gt;FINISH!&lt;/span&gt;';
        this.optEl.innerHTML = '&lt;div class=&quot;text-zinc-500 italic&quot;&gt;WAITING...&lt;/div&gt;';
        checkGameOver(this.side);
    }
}

let sound = null;
let redGame, blueGame;
let firstFinisher = null;
let finishTime = { red: null, blue: null };

function startCountdown() {
    document.getElementById('start-modal').classList.add('hidden');
    sound.playVoice('start_countdown');
    let count = 3;
    const el = document.getElementById('countdown-number');
    const timer = setInterval(() =&gt; {
        if (count &gt; 0) {
            el.textContent = count;
            el.classList.remove('countdown-pop');
            void el.offsetWidth;
            el.classList.add('countdown-pop');
            count--;
        } else {
            clearInterval(timer);
            el.textContent = &quot;GO!&quot;;
            el.classList.add('countdown-pop');
            setTimeout(() =&gt; {
                document.getElementById('overlay').classList.add('hidden');
                redGame.render();
                blueGame.render();
            }, 800);
        }
    }, 1000);
}

function initGames() {
    if(!sound) sound = new SoundManager();
    redGame = new PlayerGame(1, 'red', sound);
    blueGame = new PlayerGame(2, 'blue', sound);
    redGame.init(gameData);
    blueGame.init(gameData);
    firstFinisher = null;
    finishTime = { red: null, blue: null };
    startCountdown();
}

function showCountdown(num) {
    const el = document.getElementById('countdown-number');
    el.textContent = num;
    el.classList.remove('countdown-pop');
    void el.offsetWidth;
    el.classList.add('countdown-pop');
}

function checkGameOver(side) {
    finishTime[side] = Date.now();
    if (!firstFinisher) {
        firstFinisher = side;
        sound.playVoice(side === 'red' ? 'red_first' : 'blue_first');
        createConfetti();
    }
    if (redGame.isFinished &amp;&amp; blueGame.isFinished) {
        calculateFinalScores();
        setTimeout(showResult, 1500);
    }
}

function calculateFinalScores() {
    // 积分规则：
    // 率先完成：+3星
    // 后完成：+1星
    // 同时完成（100ms内）：各+2星
    const diff = Math.abs(finishTime.red - finishTime.blue);
    if (diff &lt; 100) {
        redGame.score += 2;
        blueGame.score += 2;
    } else if (finishTime.red &lt; finishTime.blue) {
        redGame.score += 3;
        blueGame.score += 1;
    } else {
        redGame.score += 1;
        blueGame.score += 3;
    }
    redGame.updateUI();
    blueGame.updateUI();
}

function showResult() {
    const rScore = redGame.score;
    const bScore = blueGame.score;
    document.getElementById('final-red-score').textContent = rScore;
    document.getElementById('final-blue-score').textContent = bScore;
    const title = document.getElementById('winner-title');
    const icon = document.getElementById('winner-icon');
    if (rScore &gt; bScore) {
        title.textContent = &quot;红队获胜！&quot;;
        title.className = &quot;text-4xl md:text-6xl font-black text-red-500 mb-4 italic&quot;;
        icon.textContent = &quot;🚩&quot;;
        sound.playVoice('red_win');
    } else if (bScore &gt; rScore) {
        title.textContent = &quot;蓝队获胜！&quot;;
        title.className = &quot;text-4xl md:text-6xl font-black text-blue-500 mb-4 italic&quot;;
        icon.textContent = &quot;💎&quot;;
        sound.playVoice('blue_win');
    } else {
        title.textContent = &quot;握手言和！&quot;;
        title.className = &quot;text-4xl md:text-6xl font-black text-yellow-400 mb-4 italic&quot;;
        icon.textContent = &quot;🤝&quot;;
    }
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('result-modal').classList.remove('hidden');
    createConfetti();
}

function createConfetti() {
    const colors = ['#EF4444', '#3B82F6', '#F59E0B', '#10B981', '#FFFFFF'];
    for (let i = 0; i &lt; 150; i++) {
        const c = document.createElement('div');
        c.className = 'fixed w-2 h-4 z-50';
        c.style.backgroundColor = colors[Math.floor(Math.random()*5)];
        c.style.left = Math.random()*100 + '%';
        c.style.top = '-10%';
        document.body.appendChild(c);
        anime({
            targets: c,
            translateY: window.innerHeight + 100,
            translateX: (Math.random()-0.5)*200,
            rotate: Math.random()*1000,
            duration: 3000 + Math.random()*2000,
            easing: 'linear',
            complete: () =&gt; c.remove()
        });
    }
}

document.getElementById('start-btn').onclick = initGames;
document.getElementById('restart-btn').onclick = () =&gt; {
    document.getElementById('result-modal').classList.add('hidden');
    document.getElementById('start-modal').classList.remove('hidden');
};

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

      event.stopPropagation()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')

      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
